name: PRD Reference Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-prd-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body has context PRD reference
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request?.body || '').toLowerCase();

            const patterns = [
              /context\/prd\.md/,
              /secci[oó]n\s+prd\s*:/,
              /prd\s*:/
            ];

            const ok = patterns.some((p) => p.test(body));

            if (!ok) {
              core.setFailed([
                '❌ Falta referencia a context/PRD.md en la descripción del PR.',
                'Incluye al menos:',
                '- Ruta del PRD (ej: context/PRD.md)',
                '- Sección PRD usada (ej: Sección PRD: 3.2 Criterios de aceptación)'
              ].join('\n'));
            } else {
              core.info('✅ PR con referencia a context/PRD.md detectada.');
            }
