name: Context Log Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  context-log-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG update when implementation changes
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED"

          # Files that represent implementation changes (not docs-only)
          IMPL=$(echo "$CHANGED" | grep -E '^(apps/|shared/|scripts/|\.github/workflows/)' || true)
          LOG_UPDATED=$(echo "$CHANGED" | grep -E '^context/CHANGELOG.md$' || true)

          if [[ -n "$IMPL" && -z "$LOG_UPDATED" ]]; then
            echo "❌ Detectamos cambios de implementación sin actualización de context/CHANGELOG.md"
            exit 1
          fi

          echo "✅ Context log check passed"
